# ============================================================
# Netlify configuration — Dashboard Ultimate
# Doc: https://docs.netlify.com/configure-builds/file-based-configuration/
# ============================================================

[build]
  command = "node tools/patch-index-storage.js"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # Pin Node so functions don't break on Netlify default-version bumps.
  NODE_VERSION = "20"
  # Avoid noisy npm output in Netlify build logs
  NPM_CONFIG_LOGLEVEL = "warn"
  # If you ever add a build step, prevent dev deps from being installed:
  # NPM_FLAGS = "--production=false"

[functions]
  node_bundler = "esbuild"
  # If a future function needs an external module not bundleable, list it here:
  # external_node_modules = ["sharp"]

[context.production]
  [context.production.environment]
    NODE_ENV = "production"

[context.deploy-preview]
  [context.deploy-preview.environment]
    NODE_ENV = "preview"

[context.branch-deploy]
  [context.branch-deploy.environment]
    NODE_ENV = "preview"

# Headers are defined in _headers. Keep CSP there to avoid duplicate rules.
