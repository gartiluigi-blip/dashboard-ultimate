name: Lighthouse CI

# Run a Lighthouse audit on every push to main and on pull requests.
# Helps catch performance/accessibility regressions before they hit prod.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Audit deployed site
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for Netlify deploy
        # Gives Netlify ~90s to finish deploying after push.
        # If your deploys are faster, lower this. If slower, raise it.
        run: sleep 90

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse CI
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
        run: |
          lhci collect \
            --url=https://ultimatedashboard.netlify.app/ \
            --numberOfRuns=3 \
            --settings.preset=desktop
          lhci assert \
            --assertions.categories:performance=0.85 \
            --assertions.categories:accessibility=0.95 \
            --assertions.categories:best-practices=0.90 || true
          lhci upload --target=temporary-public-storage

      - name: Comment results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚦 Lighthouse audit completed. Check the action logs for the public report URL.'
            })
