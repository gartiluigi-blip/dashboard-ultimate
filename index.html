<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#09090f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dashboard</title>
<link rel="stylesheet" href="/assets/app.css?v=4.1.0">
<script>
/* Unregister any old service worker so it can't serve stale cached pages */
if (navigator.serviceWorker) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    regs.forEach(function(r) { r.unregister(); });
  }).catch(function(){});
}
/* Clear any old caches from previous versions */
if (window.caches) {
  caches.keys().then(function(keys) {
    keys.forEach(function(k) { caches.delete(k); });
  }).catch(function(){});
}
</script>
</head>
<body>

<div id="app">
  <header id="app-header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-icon">🥊</div>
        <div class="brand-name">FIGHT<span>BOARD</span></div>
      </div>
      <div id="header-date" class="header-date"></div>
    </div>
    <nav id="tab-nav" role="tablist">
      <div class="tab" data-tab="aujourdhui" role="tab">Aujourd'hui</div>
      <div class="tab" data-tab="stats"      role="tab">Stats</div>
      <div class="tab" data-tab="routine"    role="tab">Routine</div>
      <div class="tab" data-tab="sport"      role="tab">Sport</div>
      <div class="tab" data-tab="etude"      role="tab">Étude</div>
      <div class="tab" data-tab="loisir"     role="tab">Loisir</div>
      <div class="tab" data-tab="argent"     role="tab">Argent</div>
      <div class="tab" data-tab="reglages"   role="tab">Réglages</div>
    </nav>
  </header>

  <main id="page-container">
    <div id="page-aujourdhui" class="page"></div>
    <div id="page-stats"      class="page"></div>
    <div id="page-routine"    class="page"></div>
    <div id="page-sport"      class="page"></div>
    <div id="page-etude"      class="page"></div>
    <div id="page-loisir"     class="page"></div>
    <div id="page-argent"     class="page"></div>
    <div id="page-reglages"   class="page"></div>
  </main>
</div>

<div id="toast"></div>

<!-- Modal overlay -->
<div id="modal-overlay" class="modal-overlay" style="display:none" role="dialog" aria-modal="true">
  <div class="modal-box" id="modal-box"></div>
</div>

<!-- Command palette -->
<div id="cmd-palette" class="cmd-palette" style="display:none" role="dialog" aria-modal="true">
  <div class="cmd-palette-box">
    <input id="cmd-input" class="cmd-input" type="text" placeholder="Rechercher... (tab, action, certif)" autocomplete="off">
    <div id="cmd-results" class="cmd-results"></div>
  </div>
</div>

<!-- Bottom navigation (mobile) -->
<nav id="bottom-nav">
  <div class="bnav-item" data-tab="aujourdhui">🏠<span>Aujourd'hui</span></div>
  <div class="bnav-item" data-tab="routine">⚡<span>Routine</span></div>
  <div class="bnav-item" data-tab="etude">📚<span>Étude</span></div>
  <div class="bnav-item" data-tab="argent">💰<span>Argent</span></div>
  <div class="bnav-item" data-tab="stats">📊<span>Stats</span></div>
  <div class="bnav-item" id="bnav-more">☰<span>Plus</span></div>
</nav>

<!-- Bottom drawer for "Plus" tabs -->
<div id="bnav-drawer" class="bnav-drawer" style="display:none">
  <div class="bnav-drawer-overlay"></div>
  <div class="bnav-drawer-content">
    <div class="bnav-drawer-item" data-tab="sport">💪<span>Sport</span></div>
    <div class="bnav-drawer-item" data-tab="loisir">🎮<span>Loisir</span></div>
    <div class="bnav-drawer-item" data-tab="reglages">⚙️<span>Réglages</span></div>
  </div>
</div>

<script src="/assets/store.js?v=4.1.0"></script>
<script src="/assets/data.js?v=4.1.0"></script>
<script src="/assets/router.js?v=4.1.0"></script>
<script src="/assets/app.js?v=4.1.0"></script>

</body>
</html>
