
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V67 CLEAN CORE</title>
<style>
body{margin:0;font-family:Arial;background:#0b0b12;color:#fff;}
h2{padding:10px}
.block{padding:14px;margin:10px;border-radius:12px;background:#1a1a25;cursor:pointer}
.block.done{opacity:.4}
#vinted{padding:15px;margin:10px;background:#12121a;border-radius:12px}
button{padding:10px;margin:5px;border-radius:8px}
</style>
</head>
<body>

<h2>ROUTINE</h2>
<div id="routine"></div>

<h2>VINTED</h2>
<div id="vinted">
<p>Invest: <span id="invest">0</span>€</p>
<p>Sales: <span id="sales">0</span>€</p>
<p>Profit: <span id="profit">0</span>€</p>
<button onclick="addExpense()">+ dépense</button>
<button onclick="addSale()">+ vente</button>
</div>

<script>
let state = JSON.parse(localStorage.getItem("v67")) || {
 tasks:[
  {name:"EPFC Réseaux",done:false},
  {name:"Coding",done:false},
  {name:"Trading",done:false},
  {name:"NL",done:false}
 ],
 expenses:0,
 sales:0
};

function save(){localStorage.setItem("v67",JSON.stringify(state));}

function render(){
 const r=document.getElementById("routine");
 r.innerHTML="";
 state.tasks.forEach((t,i)=>{
  const d=document.createElement("div");
  d.className="block"+(t.done?" done":"");
  d.textContent=t.name;
  d.onclick=()=>{
    state.tasks[i].done=!state.tasks[i].done;
    save();render();
  };
  r.appendChild(d);
 });

 document.getElementById("invest").textContent=state.expenses-state.sales;
 document.getElementById("sales").textContent=state.sales;
 document.getElementById("profit").textContent=state.sales-state.expenses;
}

function addExpense(){
 const v=prompt("Dépense");
 if(!v)return;
 state.expenses+=Number(v);
 save();render();
}

function addSale(){
 const v=prompt("Vente");
 if(!v)return;
 state.sales+=Number(v);
 save();render();
}

render();
</script>

</body>
</html>
